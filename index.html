<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rive Animation Viewer</title>
    <meta name="theme-color" content="#0d1117">
    <link rel="icon" type="image/png" href="icons/app-icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-shell">
        <header class="app-chrome">
            <div class="titlebar-row" id="window-titlebar" data-tauri-drag-region>
                <div class="titlebar-left" id="window-titlebar-left" data-tauri-drag-region>
                    <div class="brand-block brand-block-titlebar">
                        <div class="brand-icon" aria-hidden="true">
                            <img src="icons/app-icon.png" alt="" class="brand-app-icon">
                        </div>
                        <strong class="brand-text brand-text-full">RIVE ANIMATION VIEWER</strong>
                        <strong class="brand-text brand-text-compact">R.A.V.</strong>
                    </div>
                </div>

                <div class="titlebar-center" id="window-titlebar-center" data-tauri-drag-region>
                    <div id="header-file-meta" class="header-file-meta" hidden></div>
                </div>

                <div class="titlebar-right" data-tauri-drag-region="false">
                    <div id="window-controls" class="window-controls" hidden data-tauri-drag-region="false">
                        <button type="button" id="window-maximize-btn" class="window-control-btn window-control-btn-maximize" data-window-control="maximize" data-tauri-drag-region="false" aria-label="Maximize window" title="Maximize window">
                            <svg class="window-control-icon window-control-icon-chevron" viewBox="0 0 38 38" aria-hidden="true">
                                <polyline points="1.5 36.5 19 15.22378 36.5 36.5"></polyline>
                                <line x1="36.5" y1="1.5" x2="1.5" y2="1.5"></line>
                            </svg>
                        </button>
                        <button type="button" id="window-minimize-btn" class="window-control-btn window-control-btn-minimize" data-window-control="minimize" data-tauri-drag-region="false" aria-label="Minimize window" title="Minimize window">
                            <svg class="window-control-icon window-control-icon-chevron" viewBox="0 0 38 38" aria-hidden="true">
                                <polyline points="36.5 1.5 19 22.77622 1.5 1.5"></polyline>
                                <line x1="1.5" y1="36.5" x2="36.5" y2="36.5"></line>
                            </svg>
                        </button>
                        <button type="button" id="window-close-btn" class="window-control-btn window-control-btn-close" data-window-control="close" data-tauri-drag-region="false" aria-label="Close window" title="Close window">
                            <svg class="window-control-icon window-control-icon-close" viewBox="0 0 37.99999 37.7937" aria-hidden="true">
                                <line x1="36.49999" y1="1.5" x2="1.70629" y2="36.2937"></line>
                                <line x1="36.2937" y1="36.2937" x2="1.5" y2="1.5"></line>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="toolbar-row" role="toolbar" aria-label="Animation controls">
                <div class="toolbar-left">
                    <input type="file" id="file-input" accept=".riv">
                    <button type="button" id="file-trigger-btn" class="btn btn-primary btn-open">
                        <i data-lucide="folder-open" class="lucide-16"></i>
                        <span>OPEN</span>
                    </button>
                </div>

                <div class="toolbar-center">
                    <button type="button" id="reset-btn" class="icon-btn" title="Reset" aria-label="Reset">
                        <i data-lucide="rotate-ccw" class="lucide-16"></i>
                    </button>
                    <button type="button" id="play-btn" class="icon-btn icon-btn-accent" title="Play" aria-label="Play">
                        <i data-lucide="play" class="lucide-18"></i>
                    </button>
                    <button type="button" id="pause-btn" class="icon-btn" title="Pause" aria-label="Pause">
                        <i data-lucide="pause" class="lucide-16"></i>
                    </button>
                    <select id="runtime-select" class="header-select header-select-toolbar header-select-runtime" aria-label="Renderer">
                        <option value="webgl2" selected>RENDER: WEBGL 2</option>
                        <option value="canvas">RENDER: CANVAS</option>
                    </select>
                    <select id="layout-select" class="header-select header-select-toolbar" aria-label="Layout fit">
                        <option value="contain" selected>FIT: CONTAIN</option>
                        <option value="cover">FIT: COVER</option>
                        <option value="fill">FIT: FILL</option>
                        <option value="fitWidth">FIT: WIDTH</option>
                        <option value="fitHeight">FIT: HEIGHT</option>
                        <option value="scaleDown">FIT: SCALE DOWN</option>
                        <option value="none">FIT: NONE</option>
                        <option value="layout">FIT: LAYOUT</option>
                    </select>
                    <select id="alignment-select" class="header-select header-select-toolbar header-select-alignment" aria-label="Layout alignment">
                        <option value="topLeft">ALIGN: TOP LEFT</option>
                        <option value="topCenter">ALIGN: TOP CENTER</option>
                        <option value="topRight">ALIGN: TOP RIGHT</option>
                        <option value="centerLeft">ALIGN: CENTER LEFT</option>
                        <option value="center" selected>ALIGN: CENTER</option>
                        <option value="centerRight">ALIGN: CENTER RIGHT</option>
                        <option value="bottomLeft">ALIGN: BOTTOM LEFT</option>
                        <option value="bottomCenter">ALIGN: BOTTOM CENTER</option>
                        <option value="bottomRight">ALIGN: BOTTOM RIGHT</option>
                    </select>
                    <div class="fps-chip" id="fps-chip"><span class="dot"></span>-- FPS</div>
                </div>

                <div class="toolbar-right">
                    <div class="header-right-actions">
                        <div class="settings-wrapper">
                            <button type="button" id="settings-btn" class="icon-btn icon-btn-toolbar" title="Settings" aria-label="Settings">
                                <i data-lucide="settings" class="lucide-18"></i>
                            </button>
                            <div class="settings-popover" id="settings-popover" hidden>
                            <div class="settings-row">
                                <label class="settings-label" for="runtime-version-select">Runtime Ver</label>
                                <div class="settings-controls settings-controls-runtime">
                                    <select id="runtime-version-select" class="header-select settings-select runtime-version-select"></select>
                                </div>
                            </div>
                            <div class="settings-row settings-row-runtime-custom" id="runtime-version-custom-row" hidden>
                                <label class="settings-label" for="runtime-version-custom-input">Custom</label>
                                <div class="settings-controls settings-controls-runtime">
                                    <input
                                        type="text"
                                        id="runtime-version-custom-input"
                                        class="settings-input"
                                        placeholder="Version, e.g. 2.35.0"
                                        autocomplete="off"
                                        spellcheck="false"
                                    >
                                    <button type="button" id="runtime-version-apply-btn" class="settings-toggle">SET</button>
                                </div>
                            </div>
                            <div class="settings-row">
                                <label class="settings-label" for="canvas-color-input">BG Color</label>
                                <div class="settings-controls">
                                    <input type="color" id="canvas-color-input" value="#0d1117" class="color-input">
                                    <button type="button" id="canvas-color-reset-btn" class="settings-toggle">NO BG</button>
                                </div>
                            </div>
                            <div class="settings-row settings-row-canvas-size">
                                <label class="settings-label" for="canvas-size-width-input">Canvas Size</label>
                                <div class="settings-controls settings-controls-canvas-size">
                                    <button type="button" id="canvas-size-auto-btn" class="settings-toggle is-active" aria-pressed="true">AUTO</button>
                                    <button type="button" id="canvas-size-fixed-btn" class="settings-toggle" aria-pressed="false">FIXED</button>
                                </div>
                            </div>
                            <div class="settings-row settings-row-canvas-size-inputs">
                                <label class="settings-label" for="canvas-size-width-input">Pixels</label>
                                <div class="settings-controls settings-controls-canvas-size settings-controls-canvas-size-fields">
                                    <input
                                        type="number"
                                        id="canvas-size-width-input"
                                        class="settings-input settings-input-canvas-size"
                                        min="1"
                                        max="8192"
                                        step="1"
                                        inputmode="numeric"
                                        placeholder="Width"
                                    >
                                    <span class="settings-dimension-sep" aria-hidden="true">×</span>
                                    <input
                                        type="number"
                                        id="canvas-size-height-input"
                                        class="settings-input settings-input-canvas-size"
                                        min="1"
                                        max="8192"
                                        step="1"
                                        inputmode="numeric"
                                        placeholder="Height"
                                    >
                                    <button type="button" id="canvas-size-lock-btn" class="settings-toggle" aria-pressed="false">LOCK</button>
                                </div>
                            </div>
                            <div class="settings-row settings-row-canvas-size-meta">
                                <label class="settings-label" for="canvas-size-aspect-value">Aspect</label>
                                <div class="settings-controls settings-controls-canvas-size-meta">
                                    <span id="canvas-size-aspect-value" class="settings-note settings-note-value">16:9</span>
                                    <span class="settings-note" id="canvas-size-mode-note">Canvas follows the viewer size.</span>
                                </div>
                            </div>
                            </div>
                        </div>
                        <button type="button" id="mcp-setup-btn" class="icon-btn icon-btn-toolbar" title="MCP Setup" aria-label="MCP Setup">
                            <i data-lucide="cable" class="lucide-18"></i>
                        </button>
                        <button type="button" id="demo-bundle-btn" class="btn btn-primary">
                            <i data-lucide="download" class="lucide-16"></i>
                            <span>EXPORT</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <div class="error" id="error-message"></div>

        <div class="workspace left-hidden" id="main-grid">
            <aside class="panel code-panel" id="config-panel">
                <div class="panel-heading">
                    <div class="panel-heading-main">
                        <button type="button" id="editor-live-mode-chip" class="editor-live-mode-chip" data-live-source="internal" title="Running RAV internal wiring. Click to switch to the editor code.">
                            <span class="panel-marker editor-live-mode-dot" aria-hidden="true"></span>
                            <span class="panel-heading-label editor-live-mode-label">EDITOR</span>
                        </button>
                    </div>
                    <div class="panel-heading-actions">
                        <button type="button" id="toggle-script-console-btn" class="icon-btn-sm" title="Toggle JavaScript Console" aria-label="Toggle JavaScript Console" aria-pressed="false">
                            <i data-lucide="square-terminal" class="lucide-14"></i>
                        </button>
                        <button type="button" id="inject-vm-explorer-btn" class="icon-btn-sm vm-explorer-inject-btn" title="Inject VM Explorer" aria-label="Inject VM Explorer">
                            <svg class="lucide-14 vm-explorer-inject-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" aria-hidden="true">
                                <path fill="currentColor" d="M237.66,66.34l-48-48a8,8,0,0,0-11.32,11.32L196.69,48,168,76.69,133.66,42.34a8,8,0,0,0-11.32,11.32L128.69,60l-84,84A15.86,15.86,0,0,0,40,155.31v49.38L18.34,226.34a8,8,0,0,0,11.32,11.32L51.31,216h49.38A15.86,15.86,0,0,0,112,211.31l84-84,6.34,6.35a8,8,0,0,0,11.32-11.32L179.31,88,208,59.31l18.34,18.35a8,8,0,0,0,11.32-11.32ZM100.69,200H56V155.31l18-18,20.34,20.35a8,8,0,0,0,11.32-11.32L85.31,126,98,113.31l20.34,20.35a8,8,0,0,0,11.32-11.32L109.31,102,140,71.31,184.69,116Z"></path>
                            </svg>
                        </button>
                        <button type="button" id="apply-editor-config-btn" class="icon-btn-sm editor-apply-btn" title="Apply editor config and refresh current state" aria-label="Apply editor config and refresh current state">
                            <span>APPLY</span>
                        </button>
                        <button type="button" id="toggle-left-panel-btn" class="icon-btn panel-toggle-btn" title="Hide Script Panel" aria-label="Hide Script Panel" aria-pressed="true">
                            <i data-lucide="panel-left-close" class="lucide-14"></i>
                        </button>
                    </div>
                </div>
                <div class="code-panel-body" id="config-content">
                    <div id="code-editor"></div>
                    <div class="version-info" id="version-info">Loading runtime versions...</div>
                </div>
            </aside>

            <div class="panel-resizer" id="left-resizer" aria-hidden="true"></div>
            <button type="button" id="show-left-panel-btn" class="workspace-edge-toggle workspace-edge-toggle-left" title="Show Script Panel" aria-label="Show Script Panel" hidden>
                <i data-lucide="chevron-right" class="lucide-14"></i>
            </button>

            <section class="panel center-panel" id="center-panel">
                <div id="canvas-container" class="canvas-drop-target" aria-label="Rive canvas drop zone">
                    <div class="placeholder">
                        <div class="placeholder-icon">
                            <i data-lucide="play" class="lucide-24"></i>
                        </div>
                        <p>DROP FILE OR CLICK OPEN</p>
                    </div>
                </div>

                <div class="runtime-strip" id="runtime-strip">
                    <div class="runtime-strip-left">
                        <button type="button" class="runtime-chip runtime-chip-mcp" id="mcp-status-chip" data-mcp-state="waiting" title="MCP Bridge: waiting for connection (click to toggle)">
                            <span class="mcp-dot" aria-hidden="true"></span>MCP
                        </button>
                        <button type="button" class="runtime-chip runtime-chip-console" id="console-mode-chip" data-console-mode="closed" title="Console closed (click to open)">
                            <i data-lucide="rows-3" class="lucide-10" aria-hidden="true"></i>
                            <span id="console-mode-chip-label">OPEN</span>
                        </button>
                        <span class="runtime-strip-sep" aria-hidden="true">|</span>
                        <span class="runtime-chip runtime-chip-runtime" id="runtime-strip-runtime">RT: WEBGL2 v2.34.3</span>
                    </div>
                    <div class="runtime-strip-right">
                        <button type="button" class="runtime-chip runtime-chip-update" id="update-chip" hidden>UPDATE</button>
                        <span class="runtime-chip runtime-chip-status" id="info">Ready to load animation</span>
                    </div>
                </div>

                <div class="panel-resizer panel-resizer-horizontal" id="center-resizer" aria-hidden="true"></div>

                <button type="button" id="show-event-log-btn" class="workspace-edge-toggle workspace-edge-toggle-bottom" title="Show Event Console" aria-label="Show Event Console" hidden>
                    <i data-lucide="chevron-up" class="lucide-14"></i>
                </button>

                <div class="event-log-panel" id="event-log-panel" hidden>
                    <div class="event-log-header" id="event-log-header">
                        <div class="event-log-summary-left">
                            <div class="console-mode-toggle" role="group" aria-label="Console mode toggle">
                                <button type="button" id="event-console-tab" class="console-mode-tab is-active" aria-pressed="true">Events</button>
                                <button type="button" id="script-console-tab" class="console-mode-tab" aria-pressed="false">JS</button>
                            </div>
                            <span class="pill" id="event-log-count">0</span>
                        </div>
                        <div class="event-log-summary-right" id="event-log-filter-controls">
                            <div class="event-filter-toggles" role="group" aria-label="Event source filters">
                                <button type="button" id="event-filter-native" class="event-filter-toggle is-active" aria-pressed="true">NATIVE</button>
                                <button type="button" id="event-filter-rive-user" class="event-filter-toggle is-active" aria-pressed="true">RIVE USER</button>
                                <button type="button" id="event-filter-ui" class="event-filter-toggle is-active" aria-pressed="true">UI</button>
                                <button type="button" id="event-filter-mcp" class="event-filter-toggle is-active" aria-pressed="true">MCP</button>
                            </div>
                            <input type="search" id="event-filter-search" class="event-filter-search" placeholder="SEARCH">
                            <div class="console-toolbar-actions" role="group" aria-label="Event console actions">
                                <button type="button" class="console-icon-btn console-follow-btn is-active" id="event-log-follow-btn" aria-pressed="true" aria-label="Follow latest events" title="Follow latest events">
                                    <svg viewBox="0 0 256 256" aria-hidden="true"><path fill="currentColor" d="M205.66,138.34a8,8,0,0,1-11.32,11.32L136,91.31V224a8,8,0,0,1-16,0V91.31L61.66,149.66a8,8,0,0,1-11.32-11.32l72-72a8,8,0,0,1,11.32,0ZM216,32H40a8,8,0,0,0,0,16H216a8,8,0,0,0,0-16Z"></path></svg>
                                </button>
                                <button type="button" class="console-icon-btn console-copy-btn" id="event-log-copy-btn" aria-label="Copy visible events" title="Copy visible events">
                                    <svg viewBox="0 0 256 256" aria-hidden="true"><path fill="currentColor" d="M168,152a8,8,0,0,1-8,8H96a8,8,0,0,1,0-16h64A8,8,0,0,1,168,152Zm-8-40H96a8,8,0,0,0,0,16h64a8,8,0,0,0,0-16Zm56-64V216a16,16,0,0,1-16,16H56a16,16,0,0,1-16-16V48A16,16,0,0,1,56,32H92.26a47.92,47.92,0,0,1,71.48,0H200A16,16,0,0,1,216,48ZM96,64h64a32,32,0,0,0-64,0ZM200,48H173.25A47.93,47.93,0,0,1,176,64v8a8,8,0,0,1-8,8H88a8,8,0,0,1-8-8V64a47.93,47.93,0,0,1,2.75-16H56V216H200Z"></path></svg>
                                </button>
                                <button type="button" class="console-icon-btn console-clear-btn" id="event-log-clear-btn" aria-label="Clear event log" title="Clear event log">
                                    <svg viewBox="0 0 256 256" aria-hidden="true"><path fill="currentColor" d="M216,48H40a8,8,0,0,0,0,16h8V208a16,16,0,0,0,16,16H192a16,16,0,0,0,16-16V64h8a8,8,0,0,0,0-16ZM192,208H64V64H192ZM80,24a8,8,0,0,1,8-8h80a8,8,0,0,1,0,16H88A8,8,0,0,1,80,24Z"></path></svg>
                                </button>
                            </div>
                        </div>
                        <div class="event-log-summary-right script-console-summary-right" id="script-console-summary-right" hidden>
                            <div class="event-filter-toggles script-console-filter-toggles" role="group" aria-label="Console level filters">
                                <button type="button" id="script-console-filter-all" class="event-filter-toggle is-active" aria-pressed="true">ALL</button>
                                <button type="button" id="script-console-filter-info" class="event-filter-toggle" aria-pressed="false">INFO</button>
                                <button type="button" id="script-console-filter-warning" class="event-filter-toggle" aria-pressed="false">WARNING</button>
                                <button type="button" id="script-console-filter-error" class="event-filter-toggle" aria-pressed="false">ERROR</button>
                            </div>
                            <input type="search" id="script-console-filter-search" class="event-filter-search" placeholder="SEARCH">
                            <div class="console-toolbar-actions" role="group" aria-label="JavaScript console actions">
                                <button type="button" class="console-icon-btn console-follow-btn is-active" id="script-console-follow-btn" aria-pressed="true" aria-label="Follow latest console entries" title="Follow latest console entries">
                                    <svg viewBox="0 0 256 256" aria-hidden="true"><path fill="currentColor" d="M205.66,138.34a8,8,0,0,1-11.32,11.32L136,91.31V224a8,8,0,0,1-16,0V91.31L61.66,149.66a8,8,0,0,1-11.32-11.32l72-72a8,8,0,0,1,11.32,0ZM216,32H40a8,8,0,0,0,0,16H216a8,8,0,0,0,0-16Z"></path></svg>
                                </button>
                                <button type="button" class="console-icon-btn console-copy-btn" id="script-console-copy-btn" aria-label="Copy visible console entries" title="Copy visible console entries">
                                    <svg viewBox="0 0 256 256" aria-hidden="true"><path fill="currentColor" d="M168,152a8,8,0,0,1-8,8H96a8,8,0,0,1,0-16h64A8,8,0,0,1,168,152Zm-8-40H96a8,8,0,0,0,0,16h64a8,8,0,0,0,0-16Zm56-64V216a16,16,0,0,1-16,16H56a16,16,0,0,1-16-16V48A16,16,0,0,1,56,32H92.26a47.92,47.92,0,0,1,71.48,0H200A16,16,0,0,1,216,48ZM96,64h64a32,32,0,0,0-64,0ZM200,48H173.25A47.93,47.93,0,0,1,176,64v8a8,8,0,0,1-8,8H88a8,8,0,0,1-8-8V64a47.93,47.93,0,0,1,2.75-16H56V216H200Z"></path></svg>
                                </button>
                                <button type="button" class="console-icon-btn console-clear-btn" id="script-console-clear-btn" aria-label="Clear console output" title="Clear console output">
                                    <svg viewBox="0 0 256 256" aria-hidden="true"><path fill="currentColor" d="M216,48H40a8,8,0,0,0,0,16h8V208a16,16,0,0,0,16,16H192a16,16,0,0,0,16-16V64h8a8,8,0,0,0,0-16ZM192,208H64V64H192ZM80,24a8,8,0,0,1,8-8h80a8,8,0,0,1,0,16H88A8,8,0,0,1,80,24Z"></path></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="event-log-body" id="event-log-body">
                        <div class="event-log-list" id="event-log-list"></div>
                        <div class="script-console-view" id="script-console-view" hidden>
                            <div class="script-console-output" id="script-console-output" aria-label="JavaScript Console">
                                <div class="script-console-log-list" id="script-console-log-list"></div>
                            </div>
                            <div class="script-console-repl" id="script-console-repl">
                                <span class="script-console-repl-prompt">&gt;</span>
                                <input type="text" id="script-console-repl-input" class="script-console-repl-input" placeholder="Type JS and press Enter" autocomplete="off" spellcheck="false">
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <button type="button" id="show-right-panel-btn" class="workspace-edge-toggle workspace-edge-toggle-right" title="Show Properties Panel" aria-label="Show Properties Panel" hidden>
                <i data-lucide="chevron-left" class="lucide-14"></i>
            </button>
            <div class="panel-resizer" id="right-resizer" aria-hidden="true"></div>

            <aside class="panel properties-panel" id="right-panel">
                <div class="panel-heading panel-heading-mirrored">
                    <button type="button" id="toggle-right-panel-btn" class="icon-btn panel-toggle-btn" title="Hide Properties Panel" aria-label="Hide Properties Panel" aria-pressed="true">
                        <i data-lucide="panel-right-close" class="lucide-14"></i>
                    </button>
                    <div class="panel-heading-main panel-heading-main-end">
                        <span class="panel-marker"></span>
                        <span>PROPERTIES</span>
                        <span class="pill" id="vm-controls-count">0</span>
                    </div>
                </div>
                <div class="properties-panel-body" id="vm-controls-panel">
                    <div class="artboard-switcher" id="artboard-switcher" hidden>
                        <details class="vm-section" open>
                            <summary class="vm-section-header">
                                <i data-lucide="chevron-down" class="lucide-12 vm-section-chevron"></i>
                                <span class="vm-section-bar" style="background: #FB923C;"></span>
                                <span>ARTBOARD / ANIMATION</span>
                                <span class="vm-section-count" id="artboard-switcher-count">0</span>
                            </summary>
                            <div class="vm-section-body">
                                <div class="artboard-selection-summary" id="artboard-selection-summary" hidden></div>
                                <div class="vm-control-row">
                                    <label class="vm-control-label" for="artboard-select">Artboard</label>
                                    <div class="vm-control-input">
                                        <select id="artboard-select"></select>
                                    </div>
                                </div>
                                <div class="vm-control-row">
                                    <label class="vm-control-label" for="playback-select">Playback</label>
                                    <div class="vm-control-input">
                                        <select id="playback-select"></select>
                                    </div>
                                </div>
                                <div class="vm-control-row" id="vm-instance-row" hidden>
                                    <label class="vm-control-label" for="vm-instance-select">VM Instance</label>
                                    <div class="vm-control-input">
                                        <select id="vm-instance-select"></select>
                                    </div>
                                </div>
                                <div class="artboard-switcher-actions">
                                    <button type="button" class="btn-compact" id="artboard-reset-btn">
                                        <i data-lucide="rotate-ccw" class="lucide-10"></i> DEFAULT
                                    </button>
                                </div>
                            </div>
                        </details>
                    </div>
                    <p class="empty-state" id="vm-controls-empty">No bound ViewModel inputs detected.</p>
                    <div class="vm-controls-tree" id="vm-controls-tree"></div>
                </div>
            </aside>
        </div>
    </div>

    <script type="module" src="src/app/main-entry.js"></script>
</body>
